<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Analyzer Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00ff88;
            --accent-blue: #00d2ff;
            --accent-purple: #bb86fc;
            --accent-drive: #4285F4;
            --text-main: #ffffff;
            --text-muted: #888888;
            --sidebar-width: 280px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            overflow-x: hidden;
        }

        #sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: 4px 0 15px rgba(0,0,0,0.7);
            transition: 0.3s ease-in-out;
            z-index: 1001;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
            visibility: hidden;
        }
        #sidebar.open { 
            left: 0;
            visibility: visible;
        }
        
        .sidebar-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn { cursor: pointer; font-size: 2rem; color: var(--text-muted); line-height: 1; }

        main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
        }

        .header-container {
            display: grid;
            grid-template-columns: 50px 1fr 80px;
            width: 100%;
            max-width: 1000px;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        h1 { 
            color: var(--accent); 
            margin: 0; 
            font-size: 1.3rem; 
            text-align: center;
            white-space: nowrap;
        }
        
        #menuToggle {
            background: none; border: none; color: var(--accent); 
            font-size: 1.8rem; cursor: pointer; padding: 0;
            text-align: left;
        }

        #batteryIndicator { 
            font-size: 1rem; 
            font-weight: bold; 
            color: var(--accent); 
            text-align: right;
        }

        .main-actions {
            margin-bottom: 2.5rem;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            border: none;
        }
        .sidebar-nav button { width: 100%; margin-bottom: 10px; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #333 !important; color: #666 !important; cursor: not-allowed; }

        .btn-primary { background-color: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        .btn-sync { background-color: var(--accent-blue); color: #000; }
        .btn-import { background-color: var(--accent-purple); color: #fff; }
        .btn-drive { background-color: var(--accent-drive); color: #fff; }
        .btn-muted { background-color: var(--text-muted); color: #fff; }

        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; width: 100%; max-width: 1000px; margin-bottom: 2rem;
        }
        .card {
            background-color: var(--card-bg); padding: 15px; border-radius: 12px;
            text-align: center; border-top: 4px solid var(--accent);
        }
        .card-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 1.8rem; font-weight: bold; }
        
        .chart-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; width: 100%; max-width: 1000px;
        }
        .chart-container {
            background-color: var(--card-bg); padding: 15px; border-radius: 12px; height: 220px;
        }
        #status { color: var(--text-muted); font-size: 0.85rem; margin-top: 1.5rem; }

        #overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <nav id="sidebar">
        <div class="sidebar-header">
            <span>Tools & Export</span>
            <span class="close-btn" id="closeSidebar">&times;</span>
        </div>
        <div class="sidebar-nav">
            <button id="syncBtn" class="btn-sync" disabled>Sync Offline Data</button>
            <button id="importBtn" class="btn-import">Import CSV File</button>
            <button id="exportBtn" class="btn-muted" disabled>Download CSV</button>
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <button id="authBtn" style="background: white; color: #555;">Google Sign In</button>
            <button id="saveDriveBtn" class="btn-drive" disabled>Save to Drive</button>
        </div>
    </nav>

    <main>
        <div class="header-container">
            <button id="menuToggle">☰</button>
            <h1>Padel Analyzer Pro</h1>
            <div id="batteryIndicator">🔋 --%</div>
        </div>

        <div class="main-actions">
            <button id="connectBtn" class="btn-primary" style="padding: 18px 45px; font-size: 1.1rem;">Connect Sensor</button>
        </div>

        <div class="dashboard">
            <div class="card" style="border-top-color: var(--accent-blue);">
                <div class="card-title">Last Swing</div>
                <div class="card-value" id="val-type">--</div>
            </div>
            <div class="card" style="border-top-color: var(--accent-purple);">
                <div class="card-title">Accuracy</div>
                <div class="card-value" id="val-accuracy">--</div>
            </div>
            <div class="card">
                <div class="card-title">Speed</div>
                <div class="card-value"><span id="val-speed">0</span> <span style="font-size:0.9rem; color:#888;">km/h</span></div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container"><canvas id="speedChart"></canvas></div>
            <div class="chart-container"><canvas id="accuracyChart"></canvas></div>
            <div class="chart-container"><canvas id="typeChart"></canvas></div>
        </div>

        <div id="status">Status: Disconnected</div>
        <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
    </main>

    <script>
        const CLIENT_ID = '635167346400-mf5u84nuuda5ckhvcon0t5l3pbf0dv6s.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const REDIRECT_URI = 'https://padel-app-ev.netlify.app/';

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        document.getElementById('menuToggle').onclick = () => { sidebar.classList.add('open'); overlay.style.display = 'block'; };
        document.getElementById('closeSidebar').onclick = overlay.onclick = () => { sidebar.classList.remove('open'); overlay.style.display = 'none'; };

        let accessToken = null;

        function gapiInit() { 
            gapi.load('client', async () => { 
                await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); 
            }); 
        }

        window.addEventListener('load', () => {
            const hashString = window.location.hash.substring(1);
            const params = new URLSearchParams(hashString);
            
            if (params.has('access_token')) {
                accessToken = params.get('access_token');
                window.history.replaceState({}, document.title, window.location.pathname);
                statusText.innerText = "Status: Google Authorized"; 
                statusText.style.color = "#00ff88";
                if (sessionData && sessionData.length > 1) {
                    document.getElementById('saveDriveBtn').disabled = false;
                }
            }
        });
        // Sisse logimine
        document.getElementById('authBtn').onclick = () => {
            statusText.innerText = "Status: Redirecting to Google...";
            const authUrl = "https://accounts.google.com/o/oauth2/v2/auth?" +
                "client_id=" + CLIENT_ID + "&" +
                "redirect_uri=" + encodeURIComponent(REDIRECT_URI) + "&" +
                "response_type=token&" +
                "scope=" + encodeURIComponent(SCOPES) + "&" +
                "prompt=consent";
            window.location.href = authUrl;
        };
        //CSV faili tegemine
        document.getElementById('saveDriveBtn').onclick = async () => {
            if (!accessToken || sessionData.length <= 1) return;
            statusText.innerText = "Status: Uploading to Drive...";
            const csvContent = sessionData.map(e => e.join(",")).join("\n");
            const metadata = { 'name': `Padel_Session_${new Date().toISOString().slice(0,10)}.csv`, 'mimeType': 'text/csv' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([csvContent], { type: 'text/csv' }));
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form
            });
            if (resp.ok) statusText.innerText = "Status: Saved to Google Drive!";
        };

        let shotCount = 0, sessionData = [["Shot Number", "Time", "Swing Type", "Accuracy", "Speed (km/h)"]];
        const statusText = document.getElementById('status'), connectBtn = document.getElementById('connectBtn');
        let service;
        //graafikud
        const speedChart = new Chart(document.getElementById('speedChart').getContext('2d'), {
            type: 'line', data: { labels: [], datasets: [{ label: 'Speed', data: [], borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 136, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Speed Trend' } } }
        });
        const accuracyChart = new Chart(document.getElementById('accuracyChart').getContext('2d'), {
            type: 'doughnut', data: { labels: ['Sweet', 'Off'], datasets: [{ data: [0, 0], backgroundColor: ['#bb86fc', '#ff4444'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Accuracy' } } }
        });
        const typeChart = new Chart(document.getElementById('typeChart').getContext('2d'), {
            type: 'bar', data: { labels: ['Flat', 'Top', 'Slice'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#00d2ff', '#00ff88', '#bb86fc'], borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'Swing Types' }, legend: { display: false } } }
        });

        function updateDashboard(type, acc, speed) {
            document.getElementById('val-type').innerText = type;
            document.getElementById('val-accuracy').innerText = acc;
            document.getElementById('val-speed').innerText = speed;
            document.getElementById('exportBtn').disabled = false;
            if (accessToken) document.getElementById('saveDriveBtn').disabled = false;
        }

        document.getElementById('importBtn').onclick = () => document.getElementById('csvFileInput').click();
        document.getElementById('csvFileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const rows = ev.target.result.split('\n');
                sessionData = [["Shot Number", "Time", "Swing Type", "Accuracy", "Speed (km/h)"]];
                accuracyChart.data.datasets[0].data = [0,0]; typeChart.data.datasets[0].data = [0,0,0]; speedChart.data.labels = []; speedChart.data.datasets[0].data = [];
                for(let i=1; i<rows.length; i++) {
                    const c = rows[i].split(','); if(c.length < 5) continue;
                    const s = parseFloat(c[4]);
                    speedChart.data.labels.push(c[0]); speedChart.data.datasets[0].data.push(s);
                    if(c[3]==='SweetSpot') accuracyChart.data.datasets[0].data[0]++; else accuracyChart.data.datasets[0].data[1]++;
                    if(c[2]==='Flat') typeChart.data.datasets[0].data[0]++; else if(c[2]==='Topspin') typeChart.data.datasets[0].data[1]++; else typeChart.data.datasets[0].data[2]++;
                    sessionData.push([c[0], c[1], c[2], c[3], s]);
                    updateDashboard(c[2], c[3], s);
                }
                speedChart.update(); accuracyChart.update(); typeChart.update();
                statusText.innerText = "Status: CSV Data Loaded";
            };
            reader.readAsText(e.target.files[0]);
        };

        connectBtn.onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [0x181A] }], optionalServices: ['battery_service'] });
                const server = await device.gatt.connect();
                service = await server.getPrimaryService(0x181A);

                try {
                    const batteryService = await server.getPrimaryService('battery_service');
                    const batteryLevelChar = await batteryService.getCharacteristic('battery_level');
                    
                    const batteryValue = await batteryLevelChar.readValue();
                    const batteryPercent = batteryValue.getUint8(0);
                    document.getElementById('batteryIndicator').innerText = `🔋 ${batteryPercent}%`;

                    await batteryLevelChar.startNotifications();
                    batteryLevelChar.addEventListener('characteristicvaluechanged', (ev) => {
                        const newPercent = ev.target.value.getUint8(0);
                        document.getElementById('batteryIndicator').innerText = `🔋 ${newPercent}%`;
                    });
                } catch (battErr) {
                    console.warn(battErr);
                }
                //Dekodeerimine lühendid pikemaks
                const dataChar = await service.getCharacteristic(0x2A6E);
                await dataChar.startNotifications();
                dataChar.addEventListener('characteristicvaluechanged', (ev) => {
                    const d = new TextDecoder().decode(ev.target.value).split(';');
                    if(d.length === 3) {
                        shotCount++;
                        let type = d[0].trim(); if(type==='Top') type='Topspin';
                        let acc = d[1].trim(); if(acc==='Sweet') acc='SweetSpot'; else acc='Off-Center';
                        const speed = parseFloat(d[2]);
                        sessionData.push([shotCount, new Date().toLocaleTimeString(), type, acc, speed]);
                        updateDashboard(type, acc, speed);
                        speedChart.data.labels.push(shotCount); speedChart.data.datasets[0].data.push(speed);
                        speedChart.update();
                        if(acc==='SweetSpot') accuracyChart.data.datasets[0].data[0]++; else accuracyChart.data.datasets[0].data[1]++;
                        accuracyChart.update();
                        if(type==='Flat') typeChart.data.datasets[0].data[0]++; else if(type==='Topspin') typeChart.data.datasets[0].data[1]++; else typeChart.data.datasets[0].data[2]++;
                        typeChart.update();
                    }
                });
                statusText.innerText = "Status: Sensor Connected";
                statusText.style.color = '#00ff88'; connectBtn.style.display = 'none'; document.getElementById('syncBtn').disabled = false;
            } catch(e) { statusText.innerText = "Error: " + e; }
        };
        //Offline sync
        document.getElementById('syncBtn').onclick = async () => {
            statusText.innerText = "Status: Requesting Sync...";
            try {
                if (!service) {
                    statusText.innerText = "Error: Sensor not connected properly.";
                    return;
                }
                const cmdChar = await service.getCharacteristic(0x2A6F);
                const command = new TextEncoder().encode('S');
                await cmdChar.writeValue(command); 
                statusText.innerText = "Status: Downloading offline data...";
            } catch(e) { 
                statusText.innerText = "Sync Error: " + e; 
                console.error(e);
            }
        };
        //Export csv
        document.getElementById('exportBtn').onclick = () => {
            let csv = "data:text/csv;charset=utf-8," + sessionData.map(e => e.join(",")).join("\n");
            const link = document.createElement("a"); link.href = encodeURI(csv); link.download = "Padel_Session.csv"; link.click();
        };
    </script>
    <script src="https://apis.google.com/js/api.js" onload="gapiInit()"></script>
</body>
</html>
